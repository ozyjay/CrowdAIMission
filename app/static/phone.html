<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crowd AI Mission Control</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body class="phone">
    <main class="phone-shell">
      <p class="eyebrow">Humans in the Loop</p>
      <h1 id="mission-title">Crowd AI Mission Control</h1>
      <p id="mission-phase" class="status-pill">Loading</p>
      <section class="panel">
        <h2 id="question">Joining current round</h2>
        <div id="choices" class="choice-stack"></div>
        <p id="feedback" class="muted">Use the buttons to guide the shared demo.</p>
      </section>
    </main>
    <script src="/static/app.js" defer></script>
  </body>
</html>
