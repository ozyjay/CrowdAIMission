<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Replay Mode</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body class="screen">
    <main class="replay-shell">
      <p class="eyebrow">Replay Mode</p>
      <h1>Live mode unavailable.</h1>
      <p class="lead">Showing a prepared mission run. It shows the same idea in a reliable way.</p>
      <section class="pipeline">
        <h2>Prepared Control Loop</h2>
        <ol>
          <li>People set the goal</li>
          <li>People set the rule</li>
          <li>Local AI proposed a bounded response</li>
          <li>Software checked it</li>
          <li>Humans chose repair or fallback</li>
        </ol>
      </section>
    </main>
  </body>
